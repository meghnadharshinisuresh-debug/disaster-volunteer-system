{% extends "base.html" %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="container">

<div class="row justify-content-center align-items-center vh-100">

<div class="col-md-5">

<div class="card shadow-lg p-5">

<h2 class="text-center heading mb-4">
Volunteer Registration
</h2>

<form method="POST">

<div class="mb-3">

<label>Name</label>

<input
type="text"
name="name"
class="form-control"
placeholder="Enter Name"
required>

</div>

<div class="mb-3">

<label>Email</label>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter Email"
required>

</div>

<div class="mb-3">

<label>Password</label>

<input
type="password"
name="password"
class="form-control"
placeholder="Enter Password"
required>

</div>

<div class="mb-4">

<label>Role</label>

<select
name="role"
class="form-select">

<option>Volunteer</option>
<option>Admin</option>

</select>

</div>

<button
type="submit"
class="btn btn-primary w-100">

Register

</button>

</form>

<hr>

<p class="text-center">

Already have an account?

<a href="/login">
Login
</a>

</p>

</div>

</div>

</div>

</div>

{% endblock %}
