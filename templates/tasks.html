{% extends "base.html" %}

{% block title %}
Tasks
{% endblock %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">
        Task Management
    </h2>

    <table class="table table-bordered table-striped">

        <thead>

            <tr>

                <th>ID</th>

                <th>Task Name</th>

                <th>Description</th>

                <th>Status</th>

                <th>Actions</th>

            </tr>

        </thead>

        <tbody>

            {% for task in tasks %}

            <tr>

                <td>{{ task.id }}</td>

                <td>{{ task.task_name }}</td>

                <td>{{ task.description }}</td>

                <td>

                    <span class="badge bg-primary">
                        {{ task.status }}
                    </span>

                </td>

                <td>

                    <a href="/assign_volunteer/{{ task.id }}"
                       class="btn btn-warning btn-sm">

                        Assign

                    </a>

                    <a href="/update_task/{{ task.id }}/In Progress"
                       class="btn btn-info btn-sm">

                        Start

                    </a>

                    <a href="/update_task/{{ task.id }}/Completed"
                       class="btn btn-success btn-sm">

                        Complete

                    </a>

                    <a href="/delete_task/{{ task.id }}"
                       class="btn btn-danger btn-sm">

                        Delete

                    </a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
