{% extends "base.html" %}

{% block title %}
Manage Users
{% endblock %}

{% block content %}

<div class="container mt-5">

    <h2 class="mb-4">
        Registered Users
    </h2>

    <table class="table table-bordered table-striped">

        <thead class="table-dark">

            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Action</th>
            </tr>

        </thead>

        <tbody>

            {% for user in users %}

            <tr>

                <td>{{ user.id }}</td>
                <td>{{ user.name }}</td>
                <td>{{ user.email }}</td>
                <td>{{ user.role }}</td>

                <td>

                    <a href="/delete_user/{{ user.id }}"
                       class="btn btn-danger btn-sm">

                        Delete

                    </a>

                </td>

            </tr>

            {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
